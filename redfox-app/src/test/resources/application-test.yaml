spring:
  main:
    allow-bean-definition-overriding: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: true

redfox:
  security:
    authserver-token-uri: http://localhost/oauth2/token
    client-id: webapp-client
    cookie-domain: localhost
    cookie-secure: false
    refresh-cookie-max-age: 30h
    basic:
      enabled: false

logging:
  level:
    io.github.malczuuu.redfox: DEBUG
