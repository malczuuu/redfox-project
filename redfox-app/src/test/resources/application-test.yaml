spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost

redfox:
  security:
    authserver-token-uri: http://localhost/oauth2/token
    client-id: webapp-client
    cookie-domain: localhost
    cookie-secure: false
    refresh-cookie-max-age: 30h
    basic:
      enabled: true

logging:
  level:
    io.github.malczuuu.redfox: DEBUG
