spring:
  application:
    name: redfox-flyway
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://localhost:5432/redfox
    username: postgres
    password: postgres
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: true
