server:
  port: 8483

spring:
  application:
    name: redfox-authserver
  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    url: jdbc:postgresql://localhost:5432/redfox
    username: postgres
    password: postgres
  validation:
    method:
      adapt-constraint-violations: true
  security:
    oauth2:
      authorizationserver:
        issuer: ${REDFOX_AUTHSERVER_ISSUER:http://localhost:8483}
        client:
          webapp-client:
            registration:
              client-id: webapp-client
              client-authentication-methods:
                - none
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - http://localhost:8482/oauth2/callback
              scopes:
                - openid
            require-proof-key: true
            token:
              access-token-time-to-live: 30m
              refresh-token-time-to-live: 8h
              reuse-refresh-tokens: false

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,prometheus"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

redfox:
  authserver:
    remember-me-refresh-token-ttl: ${REDFOX_REMEMBER_ME_TTL:90d}

problem4j:
  detail-format: lowercase
