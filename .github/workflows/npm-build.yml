name: NPM Build
on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/npm-build.yml"
      - "redfox-webapp/**"
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/npm-build.yml"
      - "redfox-webapp/**"

jobs:
  build:
    name: Build (Node.js 24)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: redfox-webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: "redfox-webapp/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Check Prettier
        run: npm run prettier:check

      - name: Build Project
        run: npm run build --if-present
