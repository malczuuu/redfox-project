<nav class="breadcrumb">
  @for (item of items; track item.label; let last = $last) {
    @if (item.link && !last) {
      <a [routerLink]="item.link" class="breadcrumb-link">{{ item.label }}</a>
      <span class="separator">/</span>
    } @else {
      <span class="breadcrumb-current">{{ item.label }}</span>
    }
  }
</nav>
