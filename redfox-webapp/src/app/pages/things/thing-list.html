<app-breadcrumb
  [items]="[{ label: 'Projects', link: '/projects' }, { label: project()?.name ?? 'Project' }]"
/>

<div class="header">
  <h2>Things</h2>
  <button mat-flat-button (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    New Thing
  </button>
</div>

<div class="table-wrapper">
  <table mat-table [dataSource]="things()" class="full-width">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let thing">{{ thing.code }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let thing">{{ thing.name }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let thing">{{ thing.description }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let thing">
        <div class="actions-cell">
          <button mat-icon-button class="btn-edit" (click)="openEditDialog(thing)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="btn-delete" (click)="deleteThing(thing)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<mat-paginator
  [length]="totalElements()"
  [pageSize]="pageSize()"
  [pageIndex]="pageIndex()"
  [pageSizeOptions]="[10, 20, 50]"
  (page)="onPageChange($event)"
></mat-paginator>
