server:
  port: 8480

spring:
  application:
    name: redfox-gateway
  main:
    banner-mode: off
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: redfox-app
              uri: ${redfox.gateway.app.base-url:http://localhost:8481}
              predicates:
                - Path=/api/**
              order: 100
            - id: redfox-webapp
              uri: ${redfox.gateway.webapp.base-url:http://localhost:8482}
              predicates:
                - Path=/**
              order: 200

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,prometheus"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
